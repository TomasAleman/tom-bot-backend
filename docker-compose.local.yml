# Infra mínima local: Postgres (TomBot), Postgres (Evolution API), Redis, Evolution API.
# Backend y frontend: correrlos desde el IDE (npm run dev) apuntando a localhost.
# n8n: docker compose -f docker-compose.n8n.local.yml up -d
name: tombot-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo
      POSTGRES_DB: evolution
    ports:
      - "5432:5432"
    volumes:
      - tombot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - tombot_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Imagen oficial: evoapicloud/evolution-api (no confundir con "evolutionapi/..." de ejemplos viejos).
  #
  # Manager "Error : Unauthorized" al CREAR instancia: el SPA solo manda header "apikey" si en el
  # navegador existe localStorage "token" (y "apiUrl"/"version"). Si quedó basura de otra sesión,
  # F12 → Application → Local Storage → tu origen (ej. http://localhost:8081) → borrá apiUrl, token,
  # version, clientName y volvé a /manager/login. URL del servidor = raíz de la API (ej.
  # http://localhost:8081) SIN /manager. Misma URL que SERVER_URL abajo (no mezclar localhost y 127.0.0.1).
  # Atajo sin Manager: scripts/evolution_local_create_instance.ps1
  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8081:8080"
    volumes:
      - tombot_evolution_instances:/evolution/instances
    environment:
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: tom-bot-evo-local
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Misma URL que uses en el navegador para abrir el Manager (host + puerto publicado).
      SERVER_URL: http://localhost:8081
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evoapi:evoapi@evolution-postgres:5432/evolutionapi?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: tombot_local
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution_local
      CACHE_REDIS_SAVE_INSTANCES: "true"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  evolution-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evoapi
      POSTGRES_PASSWORD: evoapi
      POSTGRES_DB: evolutionapi
    ports:
      - "5434:5432"
    volumes:
      - tombot_evolution_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evoapi -d evolutionapi"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Migraciones SQL (one-shot). Ejemplo:
  # docker compose -f docker-compose.local.yml --profile tools run --rm migrate
  migrate:
    image: node:20-alpine
    working_dir: /repo
    environment:
      PGURL: postgres://evo:evo@postgres:5432/evolution
    volumes:
      - ./:/repo
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm install --prefix microservice && NODE_PATH=/repo/microservice/node_modules node scripts/apply_migrations.js"]
    profiles: ["tools"]

volumes:
  tombot_pg:
  tombot_redis:
  tombot_evolution_pg:
  tombot_evolution_instances:
